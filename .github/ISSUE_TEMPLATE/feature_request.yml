name: Feature request
description: A new feature or capability.
title: "[Feature]: "
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Describe the capability and why it is worth doing. See the
        [D3Clarity issue standard](https://github.com/D3Clarity/.github/blob/main/ISSUE_TRACKING.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What the feature is and why — the problem it solves.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / Component
      description: Which subsystem/repo this touches (widget engine, assistant/AI agent, deploy-config, lambda, etc.).
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: A verifiable checklist that defines "done".
      value: |
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: proportionality
    attributes:
      label: Proportionality note
      description: The smallest thing that fully solves the problem; what is explicitly out of scope.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to code, working_docs/, related issues/PRs.
    validations:
      required: false
