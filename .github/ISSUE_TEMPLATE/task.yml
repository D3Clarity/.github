name: Task / chore
description: Engineering chore with no user-facing behavior change (refactor, infra, cleanup, docs-adjacent work).
title: "[Task]: "
type: Task
body:
  - type: markdown
    attributes:
      value: |
        For engineering chores with no user-facing behavior change. See the
        [D3Clarity issue standard](https://github.com/D3Clarity/.github/blob/main/ISSUE_TRACKING.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs doing and why.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / Component
      description: The repo, files, scripts, or resources involved.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: A verifiable checklist that defines "done".
      value: |
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: proportionality
    attributes:
      label: Proportionality note
      description: The smallest change that solves it; what is explicitly out of scope.
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to code, working_docs/, related issues/PRs.
    validations:
      required: false
