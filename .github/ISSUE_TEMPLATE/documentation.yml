name: Documentation
description: A documentation-only change (no code or behavior change).
title: "[Docs]: "
type: Docs
body:
  - type: markdown
    attributes:
      value: |
        For documentation-only changes (READMEs, guides, comments, specs). See the
        [D3Clarity issue standard](https://github.com/D3Clarity/.github/blob/main/ISSUE_TRACKING.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What documentation needs adding/fixing and why.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / Component
      description: Which docs/files/pages are affected.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: A verifiable checklist that defines "done".
      value: |
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to the docs, related issues/PRs.
    validations:
      required: false
